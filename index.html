<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, secure calculator with keyboard and mouse support">
    <meta name="theme-color" content="#2d3436">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="display-section">
                <div class="history" id="history"></div>
                <div class="display">
                    <input type="text" id="display" placeholder="0" readonly aria-label="Calculator display">
                </div>
            </div>
            <div class="buttons">
                <!-- Row 1: Clear, /, *, - -->
                <button class="btn clear" onclick="clearDisplay()" aria-label="Clear display">C</button>
                <button class="btn operator" onclick="appendOperator('/')" aria-label="Divide">÷</button>
                <button class="btn operator" onclick="appendOperator('*')" aria-label="Multiply">×</button>
                <button class="btn operator" onclick="appendOperator('-')" aria-label="Subtract">−</button>
                
                <!-- Row 2: 7, 8, 9, + -->
                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn operator" onclick="appendOperator('+')" aria-label="Add">+</button>
                
                <!-- Row 3: 4, 5, 6, Backspace -->
                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn backspace" onclick="deleteLast()" aria-label="Delete last digit">⌫</button>
                
                <!-- Row 4: 1, 2, 3, . -->
                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn operator" onclick="appendNumber('.')" aria-label="Decimal point">.</button>
                
                <!-- Row 5: 0 (wide), = (wide) -->
                <button class="btn zero" onclick="appendNumber('0')">0</button>
                <button class="btn equals" onclick="calculate()" aria-label="Calculate">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
